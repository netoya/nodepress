name: Smoke — Fresh Clone

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "packages/db/**"
      - "drizzle.config.ts"
      - "tsconfig*.json"
      - "package.json"
      - ".env.example"
      - "docker-compose.yml"
      - "packages/server/**/index.ts"

jobs:
  smoke-fresh-clone:
    name: Smoke — Fresh Clone (TTFA invariant)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nodepress
          POSTGRES_PASSWORD: nodepress
          POSTGRES_DB: nodepress
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Copy .env.example → .env
        run: |
          if [ ! -f .env.example ]; then
            echo "ERROR: .env.example not found — quickstart invariant broken" >&2
            exit 1
          fi
          cp .env.example .env

      - name: TTFA timer — start
        id: ttfa_start
        run: echo "t0=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: DB — drizzle push (apply schema)
        run: npm run db:drizzle:push

      - name: Build packages/core (server needs dist/)
        run: npm run build --workspace=packages/core

      - name: Build packages/db (server needs dist/)
        run: npm run build --workspace=packages/db

      - name: Start server in background
        run: npm run dev &

      - name: Wait for server (max 30s)
        run: |
          deadline=$(( $(date +%s) + 30 ))
          until curl -sSf http://localhost:3000/ > /dev/null 2>&1; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "ERROR: server did not respond within 30s" >&2
              exit 1
            fi
            sleep 2
          done
          echo "Server is up."

      - name: Smoke — GET /wp/v2/posts returns []
        run: |
          response=$(curl -sSf http://localhost:3000/wp/v2/posts)
          echo "Response: $response"
          if [ "$response" != "[]" ]; then
            echo "ERROR: /wp/v2/posts did not return [] — got: $response" >&2
            exit 1
          fi

      - name: TTFA timer — report
        if: always()
        run: |
          t0=${{ steps.ttfa_start.outputs.t0 }}
          t1=$(date +%s)
          elapsed=$(( t1 - t0 ))
          echo ""
          echo "============================================"
          echo "TTFA: ${elapsed}s (target <300s, warn >120s)"
          echo "============================================"
          if [ "$elapsed" -gt 300 ]; then
            echo "ERROR: TTFA exceeded 300s limit (${elapsed}s). Build fails." >&2
            exit 1
          fi
          if [ "$elapsed" -gt 120 ]; then
            echo "WARNING: TTFA exceeded 120s warn threshold (${elapsed}s)."
          fi

      - name: Kill background server
        if: always()
        run: pkill -f "npm run dev" || true
