openapi: "3.1.0"

info:
  title: NodePress REST API
  version: "1.0.0"
  description: |
    WordPress REST API v2-compatible endpoints for NodePress.
    Base path: /wp/v2 — matches WP REST API routing convention.

servers:
  - url: http://localhost:3000
    description: Local development

x-nodepress-notes:
  wp-divergences:
    - id: DIV-001
      field: date_gmt / modified / modified_gmt
      status: missing
      description: |
        WP exposes date, date_gmt, modified, modified_gmt as separate fields.
        NodePress schema has createdAt (maps to date) and updatedAt (maps to modified).
        date_gmt and modified_gmt are absent — no timezone-aware UTC columns exist yet.
        The REST layer returns date and modified in ISO 8601; gmt variants are omitted.
      adr_candidate: true
    - id: DIV-002
      field: title / content / excerpt
      status: shape-mismatch
      description: |
        WP REST returns title, content, excerpt as objects with {rendered, raw, protected}.
        The Drizzle schema stores them as plain varchar/text columns.
        The REST layer MUST wrap them in the WP object shape on serialization.
        No schema change needed — this is a presentation concern.
      adr_candidate: false
    - id: DIV-003
      field: featured_media / comment_status / ping_status / format / sticky / template
      status: missing
      description: |
        These WP standard fields have no columns in the NodePress posts table.
        They are omitted from the Post schema. Clients expecting WP compat must
        treat them as absent (undefined). Add as needed in future sprints.
      adr_candidate: true
    - id: DIV-004
      field: categories / tags
      status: implemented
      description: |
        WP exposes taxonomy term arrays (categories, tags) on each post.
        NodePress stores these in term_relationships table.
        Exposed on Post responses as `categories` and `tags` (arrays of term IDs).
      adr_candidate: false
    - id: DIV-005
      field: type / menu_order / meta (JSONB)
      status: extra
      description: |
        NodePress schema has extra columns not in WP REST API v2 default response:
        type (post type), menu_order (integer), meta (JSONB).
        Exposed under _nodepress namespace in the response to avoid collision.
      adr_candidate: false

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Admin Bearer token. Set NODEPRESS_ADMIN_TOKEN env var.
        Development default: dev-admin-token.

  schemas:
    RenderedField:
      type: object
      description: WP-style wrapper for rendered string content.
      required:
        - rendered
      properties:
        rendered:
          type: string
          description: The rendered (HTML) version of the field.
        protected:
          type: boolean
          description: Whether the field is password-protected.
          default: false

    RenderedFieldEdit:
      type: object
      description: |
        WP-style wrapper for rendered string content in context=edit mode.
        Extends RenderedField by adding the `raw` field (unrendered source).
        Only present when the request includes ?context=edit (requires admin auth).
      required:
        - rendered
        - raw
      properties:
        rendered:
          type: string
          description: The rendered (HTML) version of the field.
        raw:
          type: string
          description: The unrendered source content (shortcodes, raw HTML). Gated to context=edit.
        protected:
          type: boolean
          description: Whether the field is password-protected.
          default: false

    Post:
      type: object
      description: |
        A post object following WP REST API v2 shape.
        See x-nodepress-notes for divergence details.
      required:
        - id
        - date
        - slug
        - status
        - title
        - content
        - author
      properties:
        id:
          type: integer
          description: Unique identifier for the post.
          example: 1
        date:
          type: string
          format: date-time
          description: |
            The date the post was published (local time, ISO 8601).
            Mapped from createdAt. date_gmt omitted — see DIV-001.
          example: "2026-04-17T10:00:00.000Z"
        modified:
          type: string
          format: date-time
          description: |
            The date the post was last modified (local time, ISO 8601).
            Mapped from updatedAt. modified_gmt omitted — see DIV-001.
          example: "2026-04-17T12:00:00.000Z"
        slug:
          type: string
          description: URL-friendly post identifier.
          example: "hello-world"
        status:
          type: string
          enum:
            - publish
            - future
            - draft
            - pending
            - private
            - trash
          description: Named post status.
          example: "draft"
        title:
          $ref: "#/components/schemas/RenderedField"
        content:
          $ref: "#/components/schemas/RenderedField"
        excerpt:
          $ref: "#/components/schemas/RenderedField"
        author:
          type: integer
          description: The ID for the author of the post (authorId in DB).
          example: 1
        categories:
          type: array
          description: Array of category term IDs assigned to the post. See DIV-004.
          items:
            type: integer
          example: [1, 5]
        tags:
          type: array
          description: Array of tag term IDs assigned to the post. See DIV-004.
          items:
            type: integer
          example: [3, 7, 9]
        _nodepress:
          type: object
          description: NodePress-specific fields not in WP REST API v2 (see DIV-005).
          properties:
            type:
              type: string
              description: Post type (e.g. "post", "page").
              example: "post"
            parent_id:
              type: integer
              nullable: true
              description: ID of the parent post.
            menu_order:
              type: integer
              description: Menu order for ordering posts.
              example: 0
            meta:
              type: object
              description: Arbitrary JSONB metadata.
              additionalProperties: true

    PostCreateBody:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          description: Post title (plain text).
          example: "Hello World"
        content:
          type: string
          description: Post content (HTML allowed).
          example: "<p>Welcome to NodePress.</p>"
        status:
          type: string
          enum:
            - publish
            - future
            - draft
            - pending
            - private
          default: draft
          description: Desired post status.
        excerpt:
          type: string
          description: Post excerpt (optional).
          example: "A short intro."
        slug:
          type: string
          description: |
            URL-friendly identifier.
            If omitted or empty, auto-derived from title (kebab-case, lowercase, alphanumeric + hyphens only).
            If the derived slug already exists, automatically suffixed: -2, -3, etc. until a unique slug is found.
            If an explicit slug is provided and conflicts with an existing post, returns 409 Conflict (no auto-suffix).
        categories:
          type: array
          description: Array of category term IDs to assign to the post (optional).
          items:
            type: integer
          example: [1, 5]
        tags:
          type: array
          description: Array of tag term IDs to assign to the post (optional).
          items:
            type: integer
          example: [3, 7]

    PostUpdateBody:
      type: object
      description: Partial update — all fields optional.
      properties:
        title:
          type: string
        content:
          type: string
        status:
          type: string
          enum:
            - publish
            - future
            - draft
            - pending
            - private
            - trash
        excerpt:
          type: string
        slug:
          type: string
        categories:
          type: array
          description: Array of category term IDs to assign. Replaces existing categories (idempotent).
          items:
            type: integer
        tags:
          type: array
          description: Array of tag term IDs to assign. Replaces existing tags (idempotent).
          items:
            type: integer

    WpTerm:
      type: object
      description: |
        A taxonomy term (category or tag) following WP REST API v2 shape.
        Sprint 3 constraints: parent is always 0 (flat, no hierarchy).
        count is computed from term_relationships.
      required:
        - id
        - count
        - description
        - link
        - name
        - slug
        - taxonomy
        - parent
      properties:
        id:
          type: integer
          description: Unique identifier for the term.
          example: 1
        count:
          type: integer
          description: Number of published posts associated with this term.
          example: 3
        description:
          type: string
          description: HTML description of the term.
          example: ""
        link:
          type: string
          description: URL of the term archive.
          example: "/wp/v2/categories/1"
        name:
          type: string
          description: HTML title for the term.
          example: "Uncategorized"
        slug:
          type: string
          description: An alphanumeric identifier for the term unique to its type.
          example: "uncategorized"
        taxonomy:
          type: string
          description: Type attribution for the term (category or post_tag).
          enum:
            - category
            - post_tag
          example: "category"
        parent:
          type: integer
          description: |
            The parent term ID. Always 0 in Sprint 3 (flat taxonomy, no hierarchy).
          example: 0

    WpUserPublic:
      type: object
      description: |
        A user object returned by GET /wp/v2/users (public listing).
        Omits email and sensitive fields for public exposure.
        Mirrors WP REST API v2 user shape.
      required:
        - id
        - name
        - slug
        - url
        - description
        - link
        - avatar_urls
        - _links
      properties:
        id:
          type: integer
          description: Unique identifier for the user.
          example: 1
        name:
          type: string
          description: The name of the user (displayName or login fallback).
          example: "Admin User"
        slug:
          type: string
          description: URL-friendly username (maps to login).
          example: "admin"
        url:
          type: string
          description: Author archive URL (empty in NodePress v1).
          example: ""
        description:
          type: string
          description: Short biography (empty in NodePress v1).
          example: ""
        link:
          type: string
          description: Author archive link (empty in NodePress v1).
          example: ""
        avatar_urls:
          type: object
          description: Avatar URLs by size (empty in NodePress v1).
          additionalProperties:
            type: string
          example:
            "24": ""
            "48": ""
            "96": ""
        _links:
          type: object
          description: HAL links (empty in NodePress v1).
          additionalProperties: true

    WpUser:
      type: object
      description: |
        A user object returned by GET /wp/v2/users/me (authenticated context).
        Includes email and all fields available in the users table.
        Mirrors WP REST API v2 user shape with NodePress extensions.
      required:
        - id
        - name
        - slug
        - email
        - url
        - description
        - link
        - locale
        - nickname
        - registered_date
        - roles
        - capabilities
        - _nodepress
      properties:
        id:
          type: integer
          description: Unique identifier for the user.
          example: 1
        name:
          type: string
          description: The name of the user (displayName or login fallback).
          example: "Admin User"
        slug:
          type: string
          description: URL-friendly username (maps to login).
          example: "admin"
        email:
          type: string
          format: email
          description: The user's email address.
          example: "admin@example.com"
        url:
          type: string
          description: Author archive URL (empty in NodePress v1).
          example: ""
        description:
          type: string
          description: Short biography (empty in NodePress v1).
          example: ""
        link:
          type: string
          description: Author archive link (empty in NodePress v1).
          example: ""
        locale:
          type: string
          description: User locale (hardcoded to en_US in NodePress v1).
          example: "en_US"
        nickname:
          type: string
          description: User nickname (displayName or login fallback).
          example: "Admin User"
        registered_date:
          type: string
          format: date-time
          description: User registration date (createdAt from database).
          example: "2026-04-17T10:00:00.000Z"
        roles:
          type: array
          description: Array of role names (e.g., ["admin", "editor"]).
          items:
            type: string
          example:
            - "admin"
        capabilities:
          type: object
          description: Capability map for the user (e.g., edit_posts true).
          additionalProperties: true
          example:
            edit_posts: true
        _nodepress:
          type: object
          description: NodePress-specific user fields.
          required:
            - login
          properties:
            login:
              type: string
              description: Database login field (username).
              example: "admin"

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: "UNAUTHORIZED"
        message:
          type: string
          example: "Valid Bearer token required"
        data:
          type: object
          properties:
            status:
              type: integer
              example: 401

paths:
  /wp/v2/users:
    get:
      operationId: listUsers
      summary: List users
      description: |
        Returns a list of users (public endpoint). Email and sensitive fields are omitted.
        Mirrors WP REST API GET /wp/v2/users behaviour for public consumption.
      tags:
        - Users
      parameters:
        - name: page
          in: query
          description: Current page of the collection.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Maximum number of items to return (max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: A list of users (public data only, no email).
          headers:
            X-WP-Total:
              description: Total number of users.
              schema:
                type: integer
            X-WP-TotalPages:
              description: Total number of pages.
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WpUserPublic"

  /wp/v2/users/me:
    get:
      operationId: getAuthenticatedUser
      summary: Retrieve authenticated user
      description: |
        Returns the currently authenticated user's full profile (including email).
        Requires a valid Bearer token. Anonymous requests receive 401.
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated user profile (with email).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WpUser"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wp/v2/categories:
    get:
      operationId: listCategories
      summary: List categories
      description: |
        Returns a list of category terms (taxonomy=category). Public endpoint.
        Mirrors WP REST API GET /wp/v2/categories behaviour.
      tags:
        - Taxonomies
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: search
          in: query
          description: Limit results to those matching a string (name or slug).
          schema:
            type: string
        - name: order
          in: query
          description: Order terms ascending or descending.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
        - name: orderby
          in: query
          description: Sort collection by term attribute.
          schema:
            type: string
            enum:
              - id
              - name
              - slug
              - count
            default: name
      responses:
        "200":
          description: A list of categories.
          headers:
            X-WP-Total:
              description: Total number of terms matching the query.
              schema:
                type: integer
            X-WP-TotalPages:
              description: Total number of pages.
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WpTerm"

  /wp/v2/categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Unique identifier for the term.
        schema:
          type: integer
    get:
      operationId: getCategory
      summary: Retrieve a category
      description: Retrieves a single category term by ID. Public endpoint.
      tags:
        - Taxonomies
      responses:
        "200":
          description: Category found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WpTerm"
        "404":
          description: Category not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wp/v2/tags:
    get:
      operationId: listTags
      summary: List tags
      description: |
        Returns a list of tag terms (taxonomy=post_tag). Public endpoint.
        Mirrors WP REST API GET /wp/v2/tags behaviour.
      tags:
        - Taxonomies
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: search
          in: query
          description: Limit results to those matching a string (name or slug).
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
        - name: orderby
          in: query
          schema:
            type: string
            enum:
              - id
              - name
              - slug
              - count
            default: name
      responses:
        "200":
          description: A list of tags.
          headers:
            X-WP-Total:
              description: Total number of terms matching the query.
              schema:
                type: integer
            X-WP-TotalPages:
              description: Total number of pages.
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WpTerm"

  /wp/v2/tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Unique identifier for the term.
        schema:
          type: integer
    get:
      operationId: getTag
      summary: Retrieve a tag
      description: Retrieves a single tag term by ID. Public endpoint.
      tags:
        - Taxonomies
      responses:
        "200":
          description: Tag found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WpTerm"
        "404":
          description: Tag not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wp/v2/posts:
    get:
      operationId: listPosts
      summary: List posts
      description: |
        Returns a paginated list of posts. Public endpoint — no authentication required.
        Mirrors WP REST API GET /wp/v2/posts behaviour.
      tags:
        - Posts
      parameters:
        - name: page
          in: query
          description: Current page of the collection.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Maximum number of items to return (max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: search
          in: query
          description: Limit results to those matching a string (searches title and content).
          schema:
            type: string
        - name: status
          in: query
          description: |
            Limit to posts with one or more specific statuses.
            Unauthenticated requests may only see publish status.
          schema:
            type: string
            enum:
              - publish
              - future
              - draft
              - pending
              - private
              - trash
            default: publish
        - name: context
          in: query
          description: |
            Scope of the request — controls which fields are returned (ADR-009).
            - `view` (default): public shape. title/content/excerpt omit `raw`.
            - `edit`: admin shape. title/content/excerpt include `raw` (unrendered source).
              Requires `Authorization: Bearer <token>`. Returns 401 if absent or invalid.
          schema:
            type: string
            enum:
              - view
              - edit
            default: view
      responses:
        "200":
          description: A list of posts.
          headers:
            X-WP-Total:
              description: Total number of posts matching the query.
              schema:
                type: integer
            X-WP-TotalPages:
              description: Total number of pages.
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
        "401":
          description: Missing or invalid Bearer token (only when context=edit).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createPost
      summary: Create a post
      description: |
        Creates a new post. Requires admin authentication.

        **Slug Handling (WordPress-compatible):**
        - If `slug` is omitted or empty: auto-derives from `title` (kebab-case, lowercase).
        - If derived slug collides with existing post: appends -2, -3, etc. until unique.
        - If explicit `slug` provided and collides: returns 409 Conflict (no auto-suffix).
        - If 100+ collision attempts made: returns 400 (provide explicit unique slug).

        **Hooks applied (server-side, sync):**
        - `pre_save_post` filter: applied to the full post payload immediately before
          the DB insert. Signature: `(postData: PostPayload, meta: { action: 'create'; userId?: string }) => PostPayload`.
          Allows plugins to mutate title, content, status, excerpt, or slug before persistence.
          If the filter throws, the circuit breaker contains the error and the original payload is used.
      tags:
        - Posts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostCreateBody"
      responses:
        "201":
          description: Post created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Invalid request body (e.g., missing required fields, no unique slug available after 100 collision attempts).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Explicit slug conflict. The provided slug already exists and auto-suffix was not applied (caller provided explicit slug).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wp/v2/posts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Unique identifier for the post.
        schema:
          type: integer

    get:
      operationId: getPost
      summary: Retrieve a post
      description: |
        Retrieves a single post by ID. Public endpoint by default.

        **Hooks applied at serialize time (sync):**
        - `the_content` filter: applied to `content.rendered` when building the response.
          Signature: `(content: string, post: Post) => string`.
          Plugins can transform HTML content (e.g. shortcode expansion, syntax highlighting).
          If the filter throws, the circuit breaker contains the error and the raw DB content is returned.

        **context=edit:** Returns `raw` fields and requires admin authentication (ADR-009).
      tags:
        - Posts
      parameters:
        - name: context
          in: query
          description: |
            Scope of the request (ADR-009).
            - `view` (default): public shape — no `raw` fields.
            - `edit`: admin shape — includes `raw` (unrendered source). Requires Bearer token.
          schema:
            type: string
            enum:
              - view
              - edit
            default: view
      responses:
        "200":
          description: Post found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "401":
          description: Missing or invalid Bearer token (only when context=edit).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Post not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updatePost
      summary: Update a post
      description: |
        Updates a post. Partial updates allowed — omitted fields are unchanged. Requires admin.

        **Slug Handling:**
        - If `title` is updated without explicit `slug`: re-derives slug from new title and applies auto-suffix if collision.
        - If explicit `slug` provided: uses that slug directly; returns 409 if it conflicts with another post.
        - If no `title` or `slug` in request: post slug remains unchanged.
      tags:
        - Posts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdateBody"
      responses:
        "200":
          description: Post updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Invalid request body or no fields provided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Post not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Explicit slug conflict (provided slug already exists on another post).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deletePost
      summary: Delete a post
      description: |
        Soft-deletes a post by setting status to "trash".
        Pass `?force=true` to permanently delete from the database.
        Requires admin.
      tags:
        - Posts
      security:
        - bearerAuth: []
      parameters:
        - name: force
          in: query
          description: Whether to bypass trash and force deletion.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Post deleted (or trashed).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Post"
                  - type: object
                    properties:
                      deleted:
                        type: boolean
                        example: true
                      previous:
                        $ref: "#/components/schemas/Post"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Post not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
